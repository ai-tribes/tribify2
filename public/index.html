<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta
      name="description"
      content="Tribify - Building communities, one tribe at a time"
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>$tribify</title>
    <style>
        body {
            margin: 0;
            padding: 0;
        }
        
        /* Emergency Fix for Button Colors */
        /* Buy Buttons */
        button.buy-button,
        .buy-button,
        div button.buy-button,
        .wallet-controls button.buy-button,
        .wallet-section button.buy-button,
        .modal-content button.buy-button,
        .buy-config-modal button.buy-button,
        .modal-container button.buy-button {
          background: #00ff00 !important;
          background-color: #00ff00 !important;
          color: #000000 !important;
          border: none !important;
          font-weight: bold !important;
        }
        
        /* Buy Button Hover */
        button.buy-button:hover,
        .buy-button:hover,
        div button.buy-button:hover,
        .wallet-controls button.buy-button:hover,
        .wallet-section button.buy-button:hover,
        .modal-content button.buy-button:hover,
        .buy-config-modal button.buy-button:hover,
        .modal-container button.buy-button:hover {
          background: #00cc00 !important;
          background-color: #00cc00 !important;
        }
        
        /* Sell Buttons */
        button.sell-button,
        .sell-button,
        div button.sell-button,
        .wallet-controls button.sell-button,
        .wallet-section button.sell-button,
        .modal-content button.sell-button,
        .sell-config-modal button.sell-button,
        .modal-container button.sell-button {
          background: #ff0000 !important;
          background-color: #ff0000 !important;
          color: #ffffff !important;
          border: none !important;
          font-weight: bold !important;
        }
        
        /* Sell Button Hover */
        button.sell-button:hover,
        .sell-button:hover,
        div button.sell-button:hover,
        .wallet-controls button.sell-button:hover,
        .wallet-section button.sell-button:hover,
        .modal-content button.sell-button:hover,
        .sell-config-modal button.sell-button:hover,
        .modal-container button.sell-button:hover {
          background: #cc0000 !important;
          background-color: #cc0000 !important;
        }
        
        /* Configure Buy Buttons */
        button.configure-buy-button,
        .configure-buy-button,
        div button.configure-buy-button,
        .wallet-controls button.configure-buy-button,
        .wallet-section button.configure-buy-button {
          background: rgba(0, 255, 0, 0.1) !important;
          background-color: rgba(0, 255, 0, 0.1) !important;
          color: #00ff00 !important;
          border: 1px solid #00ff00 !important;
        }
        
        /* Configure Buy Button Hover */
        button.configure-buy-button:hover,
        .configure-buy-button:hover,
        div button.configure-buy-button:hover,
        .wallet-controls button.configure-buy-button:hover,
        .wallet-section button.configure-buy-button:hover {
          background: rgba(0, 255, 0, 0.2) !important;
          background-color: rgba(0, 255, 0, 0.2) !important;
        }
        
        /* Configure Sell Buttons */
        button.configure-sell-button,
        .configure-sell-button,
        div button.configure-sell-button,
        .wallet-controls button.configure-sell-button,
        .wallet-section button.configure-sell-button {
          background: rgba(255, 0, 0, 0.1) !important;
          background-color: rgba(255, 0, 0, 0.1) !important;
          color: #ff0000 !important;
          border: 1px solid #ff0000 !important;
        }
        
        /* Configure Sell Button Hover */
        button.configure-sell-button:hover,
        .configure-sell-button:hover,
        div button.configure-sell-button:hover,
        .wallet-controls button.configure-sell-button:hover,
        .wallet-section button.configure-sell-button:hover {
          background: rgba(255, 0, 0, 0.2) !important;
          background-color: rgba(255, 0, 0, 0.2) !important;
        }
        
        /* Distribute Button Styles */
        button.distribute-button,
        .distribute-button,
        div button.distribute-button,
        .wallet-controls button.distribute-button,
        .wallet-section button.distribute-button {
          background: #00aa88 !important;
          background-color: #00aa88 !important;
          color: #ffffff !important;
          border: none !important;
          font-weight: bold !important;
          padding: 8px 16px !important;
          border-radius: 4px !important;
        }
        
        /* Distribute Button Hover */
        button.distribute-button:hover,
        .distribute-button:hover,
        div button.distribute-button:hover,
        .wallet-controls button.distribute-button:hover,
        .wallet-section button.distribute-button:hover {
          background: #008866 !important;
          background-color: #008866 !important;
        }
        
        /* Target Button Styles */
        button.target-button,
        .target-button,
        div button.target-button,
        .wallet-controls button.target-button,
        .wallet-section button.target-button {
          background: #8800aa !important;
          background-color: #8800aa !important;
          color: #ffffff !important;
          border: none !important;
          font-weight: bold !important;
          padding: 8px 16px !important;
          border-radius: 4px !important;
        }

        .target-button:hover,
        div button.target-button:hover,

          background: #660088 !important;
          background-color: #660088 !important;
        }
        
        /* Fund Button Styles */
        button.fund-button,
        .fund-button,
        div button.fund-button,
        .wallet-controls button.fund-button,
        .wallet-section button.fund-button {
          background: rgba(0, 127, 255, 0.1) !important;
          background-color: rgba(0, 127, 255, 0.1) !important;
          color: #007fff !important;
          border: 1px solid #007fff !important;
          font-weight: bold !important;
          padding: 8px 16px !important;
          border-radius: 4px !important;
        }
        
        /* Fund Button Hover */
        button.fund-button:hover,
        .fund-button:hover,
        div button.fund-button:hover,
        .wallet-controls button.fund-button:hover,
        .wallet-section button.fund-button:hover {
          background: rgba(0, 127, 255, 0.2) !important;
          background-color: rgba(0, 127, 255, 0.2) !important;
        }
    </style>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src *;">
  </head>

    <div id="root"></div>
